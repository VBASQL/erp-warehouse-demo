<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse System — Demo</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Spline+Sans+Mono:wght@400;500;600&family=Sora:wght@600;700;800;900&display=swap" rel="stylesheet">
<script>
tailwind.config = { theme: { extend: {
  fontFamily: { sans:['Archivo','sans-serif'], display:['Sora','sans-serif'], mono:['Spline Sans Mono','monospace'] },
  colors: { ink:'#0f1419', panel:'#f4f6f8' }
}}}
</script>
<style>
  :root{--blue:#1a73e8;--green:#16a34a;--amber:#d97706;--red:#dc2626;}
  body{background:#e9edf1;color:#0f1419;font-family:'Archivo',sans-serif;}
  [x-cloak]{display:none!important}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#c2cbd4;border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
  .order-card{transition:transform .08s,box-shadow .12s,border-color .12s}
  .order-card:not(.locked):hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(15,20,25,.12)}
  .dz.drag-over{background:#e7f0fe;outline:2px dashed var(--blue);outline-offset:-4px}
  .sortable-ghost{opacity:.35}
  .ref-target{cursor:pointer}
  .ref-target.ref-hover{outline:2px solid var(--blue);outline-offset:2px;border-radius:6px}
  .ref-pinned{outline:2px solid var(--blue)!important;outline-offset:2px;border-radius:6px}
  .num-pin{color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;box-shadow:0 1px 4px rgba(0,0,0,.4);border:2px solid #fff}
  .grain{background-image:radial-gradient(circle at 1px 1px,rgba(15,20,25,.035) 1px,transparent 0);background-size:18px 18px}
  .pulse-warn{animation:pw 1.4s infinite}
  @keyframes pw{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}50%{box-shadow:0 0 0 5px rgba(220,38,38,0)}}
  .modal-bg{background:rgba(15,20,25,.5);backdrop-filter:blur(2px)}
  .fade-in{animation:fi .2s ease}
  @keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .tablet{width:860px;max-width:96vw;background:#1b1f24;border-radius:34px;padding:16px;box-shadow:0 24px 60px rgba(15,20,25,.35)}
  .tablet-screen{background:#eef1f4;border-radius:18px;overflow:hidden;height:76vh;min-height:580px;position:relative}
  .tablet-cam{width:7px;height:7px;border-radius:50%;background:#3a3f45;margin:0 auto 8px}
  .big-btn{transition:transform .07s,filter .12s}.big-btn:active{transform:scale(.96)}
  table.cfg th{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#8a93a0;text-align:left;padding:6px 10px}
  table.cfg td{padding:6px 10px;border-top:1px solid #eef1f4;font-size:13px}
  .stab-grad{background:linear-gradient(90deg,#dc2626,#d97706,#16a34a)}
  @media print{body *{visibility:hidden}#printArea,#printArea *{visibility:visible}#printArea{position:absolute;inset:0;padding:24px}}
</style>
</head>
<body class="grain" x-data="app()" x-init="init()" x-cloak>

<!-- ===================== TOP NAV ===================== -->
<header class="bg-ink text-white px-5 py-2.5 flex items-center gap-5 sticky top-0 z-[1000] shadow-lg print:hidden">
  <div class="flex items-center gap-2.5">
    <div class="w-8 h-8 rounded-md bg-[var(--blue)] flex items-center justify-center font-display font-extrabold text-lg">W</div>
    <div>
      <div class="font-display font-extrabold text-lg leading-none tracking-tight">Warehouse System</div>
      <div class="text-[10px] text-gray-400 leading-none mt-0.5 font-mono">beverage wholesale · demo</div>
    </div>
  </div>
  <nav class="flex items-center gap-1 bg-white/10 rounded-lg p-0.5 ml-3">
    <template x-for="s in screens" :key="s.id">
      <button @click="screen=s.id; onScreen()" class="px-3 py-1.5 rounded-md text-xs font-semibold transition flex items-center gap-1.5"
        :class="screen===s.id?'bg-white text-ink':'text-gray-300 hover:text-white'">
        <span x-text="s.icon"></span><span x-text="s.label"></span>
      </button>
    </template>
  </nav>
  <div class="ml-auto flex items-center gap-3">
    <div x-show="screen==='dashboard'" class="flex items-center gap-1.5">
      <span class="text-xs text-gray-400">Planning</span>
      <input type="date" x-model="planDate" class="bg-white/10 text-white text-xs rounded px-2 py-1 border border-white/15 focus:outline-none">
    </div>
    <div class="text-[10px] text-gray-500 font-mono hidden xl:block">Alt-click any element → reference in chat</div>
  </div>
</header>

<!-- ===================== SCREEN: DASHBOARD ===================== -->
<main x-show="screen==='dashboard'" class="grid h-[calc(100vh-53px)]" style="grid-template-columns:320px 1fr 384px">
  <!-- LEFT: ORDER QUEUE -->
  <section class="bg-white border-r border-gray-200 flex flex-col min-h-0">
    <div class="px-4 pt-3.5 pb-2 border-b border-gray-100">
      <div class="flex items-center justify-between">
        <h2 class="font-display font-bold text-sm tracking-tight">Order Queue</h2>
        <span class="text-[10px] font-mono text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded" x-text="openOrders().length+' open'"></span>
      </div>
      <div class="flex flex-wrap gap-1 mt-2.5">
        <template x-for="f in filterChips()" :key="f">
          <button @click="filter=f" class="text-[10px] font-semibold px-2 py-1 rounded-full border transition"
            :class="filter===f?'bg-ink text-white border-ink':'bg-white text-gray-600 border-gray-200 hover:border-gray-400'" x-text="f"></button>
        </template>
      </div>
      <div class="flex items-center gap-1.5 mt-2">
        <span class="text-[10px] text-gray-400 uppercase tracking-wide font-semibold">Sort</span>
        <select x-model="sort" class="text-xs border border-gray-200 rounded px-1.5 py-1 flex-1 focus:outline-none">
          <option value="time">Time received</option><option value="area">Area</option><option value="proximity">Proximity (zip)</option>
        </select>
      </div>
    </div>
    <div class="flex-1 overflow-y-auto px-3 py-2.5 space-y-2 min-h-0">
      <template x-for="o in sortedQueue()" :key="o.id">
        <div class="order-card ref-target relative rounded-lg border bg-white px-3 py-2.5"
          :class="(isLocked(o)?'locked opacity-55 border-gray-200 ':'cursor-grab border-gray-200 ')+(selectedQ.includes(o.id)?'ring-2 ring-[var(--blue)]':'')"
          :data-refid="'order:'+o.id"
          :draggable="!isLocked(o)"
          :title="o.kind==='draft'?'Awaiting payment':(o.kind==='backorder'?'Back order — locked until in stock':'')"
          @dragstart="dragStart($event,o)" @dragend="dragId=null"
          @click="!isLocked(o) && $event.detail>0 && toggleSelect(o.id)">
          <div class="flex items-start justify-between gap-2">
            <div>
              <div class="font-mono text-[11px] font-semibold text-gray-500" x-text="o.id"></div>
              <div class="font-semibold text-[13px] leading-tight" x-text="o.customer"></div>
            </div>
            <span x-html="kindBadge(o)"></span>
          </div>
          <div class="flex items-center justify-between mt-1.5">
            <span class="text-[10px] text-gray-400" x-text="o.area+' · '+o.zip"></span>
            <span class="text-[10px] font-mono text-gray-600" x-text="orderCases(o)+' cs · '+orderFrac(o).toFixed(1)+' pal'"></span>
          </div>
          <div class="flex gap-1 mt-1.5">
            <template x-for="cat in orderCats(o)" :key="cat">
              <span class="w-2 h-2 rounded-full inline-block" :style="'background:'+CAT_COLOR[cat]" :title="cat"></span>
            </template>
          </div>
          <div x-show="isFuture(o)" class="mt-1 text-[9px] text-[var(--blue)] font-semibold">⚑ future-dated</div>
        </div>
      </template>
      <!-- category dot legend -->
      <div class="mt-2 rounded-lg bg-gray-50 border border-gray-100 px-2.5 py-2">
        <div class="text-[9px] uppercase tracking-wide font-bold text-gray-400 mb-1">Dots = product categories in order</div>
        <div class="flex flex-wrap gap-x-3 gap-y-1">
          <template x-for="[cat,col] in Object.entries(CAT_COLOR)" :key="cat">
            <span class="inline-flex items-center gap-1 text-[10px] text-gray-600"><span class="w-2 h-2 rounded-full inline-block" :style="'background:'+col"></span><span x-text="cat"></span></span>
          </template>
        </div>
      </div>
      <!-- assign-to-route action bar -->
      <div x-show="selectedQ.length>=1" class="sticky bottom-0 -mx-3 px-3 py-2 bg-ink text-white text-xs rounded-t" @click.outside="assignMenu=false">
        <div class="flex items-center gap-2">
          <span x-text="selectedQ.length+(selectedQ.length===1?' order':' orders')+' selected'"></span>
          <div class="ml-auto relative">
            <button @click="assignMenu=!assignMenu" class="bg-[var(--blue)] px-2.5 py-1 rounded font-semibold">Assign to route ▾</button>
            <div x-show="assignMenu" x-transition class="absolute right-0 bottom-full mb-1 w-52 bg-white text-ink rounded-lg shadow-xl border border-gray-200 overflow-hidden z-20">
              <template x-if="routes.length===0">
                <div class="px-3 py-2 text-[11px] text-gray-400">No routes yet — create one first.</div>
              </template>
              <template x-for="r in routes" :key="r.id">
                <button @click="assignSelectedTo(r.id)" class="w-full text-left px-3 py-2 hover:bg-gray-50 flex items-center gap-2 border-b border-gray-50">
                  <span class="w-2.5 h-2.5 rounded-full" :style="'background:'+r.color"></span>
                  <span class="font-semibold truncate" x-text="r.name"></span>
                  <span class="ml-auto text-[10px] text-gray-400" x-text="r.stops.length+' stops'"></span>
                </button>
              </template>
              <button @click="openRouteConfig(null); assignMenu=false" class="w-full text-left px-3 py-2 text-[var(--blue)] font-semibold hover:bg-blue-50">+ New route…</button>
            </div>
          </div>
          <button @click="selectedQ=[]" class="text-gray-300 underline">clear</button>
        </div>
      </div>
    </div>
  </section>

  <!-- CENTER: ROUTE WORKSPACE -->
  <section class="flex flex-col min-h-0 bg-panel">
    <div class="px-4 py-2.5 border-b border-gray-200 bg-white flex items-center gap-2">
      <h2 class="font-display font-bold text-sm tracking-tight">Route Workspace</h2>
      <button @click="openRouteConfig(null)" class="ml-1 text-xs font-semibold bg-[var(--blue)] text-white px-2.5 py-1.5 rounded-md hover:brightness-110 active:scale-95 transition">+ New Route</button>
      <button @click="openStatusModal()" class="ml-auto text-xs font-semibold border border-gray-200 text-ink px-2.5 py-1.5 rounded-md hover:bg-gray-50 flex items-center gap-1.5">
        📟 Picking status
        <span x-show="pickingBadge()>0" class="bg-[#8b5cf6] text-white text-[9px] font-bold rounded-full px-1.5 py-0.5" x-text="pickingBadge()"></span>
      </button>
    </div>

    <!-- DEMO MAP STRIP (always visible while arranging) -->
    <div class="border-b border-gray-200 bg-[#dfe7ee] shrink-0" x-html="demoMapHtml()"></div>

    <!-- ROUTE LIST -->
    <div class="flex-1 overflow-y-auto p-3.5 space-y-3.5 min-h-0">
      <template x-if="routes.length===0">
        <div class="h-full flex flex-col items-center justify-center text-center text-gray-400 gap-2 py-20">
          <div class="text-4xl">🚚</div><div class="text-sm font-semibold">No routes yet</div>
          <div class="text-xs max-w-[220px]">Click <span class="font-semibold text-[var(--blue)]">+ New Route</span>, then drag orders from the queue.</div>
        </div>
      </template>
      <template x-for="r in routes" :key="r.id">
        <div class="ref-target rounded-xl border bg-white overflow-hidden" :data-refid="'route:'+r.id"
          :class="selectedRoute===r.id?'ref-pinned':'border-gray-200'" :style="'border-left:4px solid '+r.color">
          <!-- header -->
          <div class="px-3.5 py-2.5 cursor-pointer" @click="selectedRoute=r.id; selectedOrder=null">
            <div class="flex items-center gap-2">
              <span class="font-display font-bold text-[15px] tracking-tight" x-text="r.name"></span>
              <span class="text-[10px] font-mono text-gray-500" x-text="r.driver"></span>
              <span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-amber-50 text-[var(--amber)] uppercase" x-show="!r.confirmed">tentative</span>
              <span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-green-50 text-[var(--green)] uppercase" x-show="r.confirmed">confirmed</span>
              <div class="ml-auto flex items-center gap-1.5">
                <button @click.stop="openRouteConfig(r)" class="text-[10px] border border-gray-200 rounded px-1.5 py-0.5 hover:bg-gray-50">⚙ config</button>
                <button @click.stop="saveTemplate(r)" class="text-[10px] border border-gray-200 rounded px-1.5 py-0.5 hover:bg-gray-50">save tmpl</button>
                <button @click.stop="loadSheet(r)" class="text-[10px] border border-gray-200 rounded px-1.5 py-0.5 hover:bg-gray-50">load sheet</button>
                <button @click.stop="openStatusModal(r.id)" class="text-[10px] border border-gray-200 rounded px-1.5 py-0.5 hover:bg-gray-50" x-show="routeProgress(r.id).total>0 && (routeProgress(r.id).picked+routeProgress(r.id).confirmed+routeProgress(r.id).assigned)>0">📟 status</button>
                <button @click.stop="deleteRoute(r)" class="text-[10px] text-[var(--red)] hover:underline">delete</button>
              </div>
            </div>
            <div class="flex items-center gap-2 mt-1.5 text-[10px] flex-wrap">
              <span class="px-1.5 py-0.5 rounded bg-gray-100 font-semibold" x-text="r.truckType+' · '+truckCap(r.truckType)+' pal'"></span>
              <span class="px-1.5 py-0.5 rounded bg-gray-100 font-semibold" x-text="r.loading+' load'"></span>
              <span class="px-1.5 py-0.5 rounded font-semibold" :class="r.packing==='mixed'?'bg-purple-50 text-[#8b5cf6]':'bg-blue-50 text-[var(--blue)]'" x-text="r.packing"></span>
            </div>
            <!-- capacity -->
            <div class="mt-2">
              <div class="flex items-center justify-between text-[10px] mb-0.5">
                <span class="font-semibold" :class="overCap(r)?'text-[var(--red)]':'text-gray-500'" x-text="palletCount(r)+' / '+truckCap(r.truckType)+' pallets'"></span>
                <span x-show="overCap(r)" class="text-[var(--red)] font-bold">OVER CAPACITY</span>
              </div>
              <div class="h-2.5 rounded-full bg-gray-100 overflow-hidden" :class="overCap(r)?'pulse-warn ring-1 ring-[var(--red)]':''">
                <div class="h-full rounded-full transition-all" :style="'width:'+capPct(r)+'%;background:'+(overCap(r)?'var(--red)':r.color)"></div>
              </div>
              <!-- dual readout -->
              <div class="grid grid-cols-2 gap-1.5 mt-1.5">
                <div class="text-[9px] bg-blue-50 rounded px-1.5 py-1">
                  <span class="font-bold text-[var(--blue)]">Per-order:</span> <span x-text="palletCountMode(r,'per-order')+' pal'"></span>
                  · <span x-text="(truckCap(r.truckType)-palletCountMode(r,'per-order'))+' left'"></span>
                </div>
                <div class="text-[9px] bg-purple-50 rounded px-1.5 py-1">
                  <span class="font-bold text-[#8b5cf6]">Mixed:</span> <span x-text="palletCountMode(r,'mixed')+' pal'"></span>
                  · <span x-text="(truckCap(r.truckType)-palletCountMode(r,'mixed'))+' left'"></span>
                </div>
              </div>
              <div x-show="overCap(r)" class="text-[10px] text-[var(--red)] mt-1">⚠ Exceeds truck. Try a larger truck via ⚙ config.</div>
              <!-- picking progress -->
              <template x-if="routeProgress(r.id).total>0">
                <div class="mt-2">
                  <div class="flex items-center justify-between text-[10px] mb-0.5">
                    <span class="font-semibold text-gray-500">Picking progress</span>
                    <span class="font-mono text-gray-500" x-text="routeProgress(r.id).confirmed+' confirmed · '+routeProgress(r.id).picked+' picked · '+routeProgress(r.id).assigned+' assigned / '+routeProgress(r.id).total"></span>
                  </div>
                  <div class="h-2 rounded-full bg-gray-100 overflow-hidden flex">
                    <div class="h-full bg-[var(--green)]" :style="'width:'+(routeProgress(r.id).confirmed/routeProgress(r.id).total*100)+'%'"></div>
                    <div class="h-full bg-[#8b5cf6]" :style="'width:'+(routeProgress(r.id).picked/routeProgress(r.id).total*100)+'%'"></div>
                    <div class="h-full bg-[var(--blue)]" :style="'width:'+(routeProgress(r.id).assigned/routeProgress(r.id).total*100)+'%'"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
          <!-- stops head -->
          <div class="px-3.5 pb-1 flex items-center justify-between">
            <span class="text-[10px] uppercase tracking-wide font-bold text-gray-400" x-text="'Stops ('+r.stops.length+')'"></span>
            <div class="flex items-center gap-2">
              <button x-show="r.packing==='per-order' && r.stops.length>1" @click="togglePackMode(r.id)" class="text-[10px] font-semibold hover:underline"
                :class="packMode===r.id?'text-[var(--red)]':'text-[var(--blue)]'" x-text="packMode===r.id?'✕ cancel select':'☑ select to pack'"></button>
              <button x-show="r.stops.length>1" @click="autoSort(r)" class="text-[10px] text-[var(--blue)] font-semibold hover:underline">↕ Auto-sort by proximity</button>
              <button @click="selectedRoute=r.id; assignMode=true; rearrange=false" class="text-[10px] font-semibold bg-ink text-white px-2 py-1 rounded">📟 Assign pallets</button>
            </div>
          </div>
          <!-- in-route pack-together action bar -->
          <div x-show="packMode===r.id && routeSel(r.id).length>=1" class="mx-3.5 mb-2 px-3 py-2 bg-ink text-white text-[11px] rounded-lg flex items-center gap-2">
            <span x-text="routeSel(r.id).length+' selected'"></span>
            <button @click="packSelected(r)" :disabled="routeSel(r.id).length<2"
              class="ml-auto px-2.5 py-1 rounded font-semibold" :class="routeSel(r.id).length<2?'bg-white/20 text-gray-400':'bg-[var(--blue)]'">Pack together →</button>
            <button @click="clearRouteSel(r.id)" class="text-gray-300 underline">clear</button>
          </div>
          <!-- existing pack groups -->
          <div x-show="(r.packGroups||[]).length>0" class="px-3.5 pb-1 space-y-1">
            <template x-for="(g,gi) in (r.packGroups||[])" :key="gi">
              <div class="flex items-center gap-1.5 text-[10px] bg-blue-50 text-[var(--blue)] rounded px-2 py-1">
                <span class="font-bold">⊞ Packed together:</span>
                <span class="font-mono truncate flex-1" x-text="g.join(' + ')"></span>
                <button @click="unpackGroup(r,gi)" class="hover:underline font-semibold">unpack</button>
              </div>
            </template>
          </div>
          <!-- dropzone / stops -->
          <div class="dz px-3.5 pb-3 space-y-1.5 min-h-[44px]" :data-routeid="r.id"
            @dragover.prevent="$event.currentTarget.classList.add('drag-over')"
            @dragleave="$event.currentTarget.classList.remove('drag-over')"
            @drop.prevent="$event.currentTarget.classList.remove('drag-over'); dropOnRoute(r, dragId, dragFuture)"
            x-ref="dz">
            <template x-if="r.stops.length===0">
              <div class="text-[11px] text-gray-400 italic border border-dashed border-gray-200 rounded-md py-2 text-center">Drop orders here</div>
            </template>
            <template x-for="(id,idx) in r.stops" :key="id">
              <div class="stop-row flex items-center gap-2 bg-gray-50 rounded-md px-2 py-1.5"
                :class="(selectedOrder===id?'ring-2 ring-[var(--blue)] ':'')+(packMode===r.id?'':'cursor-grab')+(routeSel(r.id).includes(id)?' bg-blue-50':'')"
                :data-stopid="id"
                @click="packMode===r.id ? toggleRouteSel(r.id,id) : (selectedRoute=r.id, selectedOrder=(r.packing==='per-order'?id:null))">
                <input x-show="packMode===r.id" type="checkbox" :checked="routeSel(r.id).includes(id)" @click.stop="toggleRouteSel(r.id,id)" class="shrink-0">
                <span class="w-5 h-5 rounded-full text-white text-[10px] font-bold flex items-center justify-center shrink-0" :style="'background:'+r.color" x-text="idx+1"></span>
                <div class="min-w-0 flex-1">
                  <div class="text-[12px] font-semibold leading-tight truncate flex items-center gap-1">
                    <span x-text="ord(id).customer"></span>
                    <span x-show="inPackGroup(r,id)" class="text-[8px] bg-blue-100 text-[var(--blue)] rounded px-1 font-bold">⊞</span>
                  </div>
                  <div class="text-[10px] text-gray-400 font-mono" x-text="id+' · '+ord(id).zip+' · '+orderFrac(ord(id)).toFixed(1)+' pal'"></div>
                </div>
                <button x-show="r.packing==='mixed' && packMode!==r.id" @click.stop="toggleSeparate(r,id)"
                  class="text-[9px] font-semibold px-1.5 py-0.5 rounded border"
                  :class="(r.separated||[]).includes(id)?'bg-purple-50 text-[#8b5cf6] border-purple-200':'border-gray-200 hover:bg-white'"
                  x-text="(r.separated||[]).includes(id)?'separated':'pack sep'"></button>
                <button x-show="packMode!==r.id" @click.stop="removeStop(r,id)" class="text-gray-300 hover:text-[var(--red)] text-xs px-1">✕</button>
              </div>
            </template>
          </div>
          <!-- bay loading note -->
          <div x-show="r.packing==='per-order' && r.loading==='Bay' && r.stops.length>1" class="px-3.5 pb-3 -mt-1">
            <div class="text-[10px] text-gray-500 bg-amber-50 border border-amber-100 rounded px-2 py-1">
              ↻ <b>Bay + per-order = first-in-last-out.</b> Load deepest first:
              <span class="font-mono" x-text="[...r.stops].reverse().join(' → ')"></span>
            </div>
          </div>
          <div x-show="r.scheduled" class="px-3.5 pb-3 -mt-1">
            <div class="text-[10px] text-[var(--blue)] bg-blue-50 rounded px-2 py-1">⏱ Picking scheduled for <span x-text="r.scheduled"></span></div>
          </div>

<script>
/* ================= APP (Alpine component) ================= */
function app(){
 return {
  screens:[
    {id:'dashboard',label:'Dashboard',icon:'🗂'},
    {id:'config',label:'Configuration',icon:'⚙'},
    {id:'handheld',label:'Manager Handheld',icon:'📱'},
    {id:'picker',label:'Picker Device',icon:'📟'},
  ],
  screen:'dashboard',
  planDate:'2026-05-28',
  // queue
  filter:'All', sort:'time', selectedQ:[], assignMenu:false, selectedStops:[], packMode:null, routeSelections:{},
  dragId:null, dragFuture:false,
  // routes
  routes:[], routeSeq:1, selectedRoute:null, selectedOrder:null, rearrange:false,
  // config data
  trucks:[{name:'Small',capacity:6},{name:'Medium',capacity:10},{name:'Large',capacity:16}],
  drivers:['J. Alvarez','M. Chen','R. Okafor'],
  templates:[
    {name:'North AM Run',truckType:'Medium',loading:'Bay',packing:'per-order',driver:'J. Alvarez'},
    {name:'East Mixed Loop',truckType:'Large',loading:'Side',packing:'mixed',driver:'M. Chen'},
  ],
  devices:[
    {num:1,name:'Device 1 (Front)',status:'Active',lastSeen:'just now',location:'in warehouse',wifi:'WH-NET-5G',connected:true,gpsNear:true},
    {num:2,name:'Device 2 (Back)',status:'Active',lastSeen:'2m ago',location:'in warehouse',wifi:'WH-NET-5G',connected:true,gpsNear:true},
  ],
  deviceSeq:3,
  warehouse:{lat:38.30,lng:-78.10,wifi:'WH-NET-5G'},
  catalogPickOrder:[], // codes
  // picking — pallet-centric assignment model
  // palletAssign: { palletId -> {device, status:'assigned'|'picking'|'picked'|'confirmed', results:[] } }
  palletAssign:{}, activeDevice:1, picker:null, listReview:{},
  palletSel:[], assignMode:false,    // pallet IDs selected by manager for assignment
  assignPalletMenu:false,  // dashboard assign menu open
  hhView:'lists',          // manager handheld: 'lists' (assignable) or status
  backSeq:2,
  cfgTabs:['Catalog','Stability Ranking','Catalog Pick Order','Truck Types','Drivers','Devices','Route Templates'],
  cfgTab:'Catalog',
  modal:{open:false,html:'',wide:false},
  toast:{show:false,msg:'',kind:'ok'},
  _bump:0, // force recompute on demand

  /* ---------- init ---------- */
  init(){
    // seed catalog pick order from current product order
    this.catalogPickOrder = PRODUCTS.map(p=>p.code);
    // seed one route
    this.routes.push({id:'R'+(this.routeSeq++),name:'North AM Run',truckType:'Medium',loading:'Bay',packing:'per-order',driver:'J. Alvarez',color:ROUTE_COLORS[0],stops:['SO-2041','SO-2043','SO-2047'],packGroups:[],separated:[],backToMixed:{},confirmed:false,scheduled:null});
    this.selectedRoute=this.routes[0].id;
    this.$nextTick(()=>{ this.wireRefClicks(); this.wireStopSortables(); });
    this.$watch('routes',()=>this.$nextTick(()=>{this.wireStopSortables();this.wireRefClicks();}),{deep:true});
    this.$watch('screen',()=>this.$nextTick(()=>this.wireRefClicks()));
    this.$watch('cfgTab',()=>this.$nextTick(()=>{this.wireRefClicks();this.wireCfgSortables();}));
    setTimeout(()=>this.flash('Tip: drag orders into routes · Alt-click any element to reference it'),700);
  },
  onScreen(){
    this.$nextTick(()=>{ this.wireRefClicks(); });
  },

  /* ---------- helpers ---------- */
  PM(){return Object.fromEntries(PRODUCTS.map(p=>[p.code,p]));},
  ord(id){return ORDERS.find(o=>o.id===id);},
  orderCases(o){return o.lines.reduce((s,l)=>s+l.cases,0);},
  orderFrac(o){const pm=this.PM();return o.lines.reduce((s,l)=>s+l.cases/pm[l.code].casesPerPallet,0);},
  orderCats(o){return [...new Set(o.lines.map(l=>this.PM()[l.code].category))];},
  truckCap(name){const t=this.trucks.find(t=>t.name===name);return t?t.capacity:0;},
  assignedIds(){return new Set(this.routes.flatMap(r=>r.stops));},
  isFuture(o){return o.kind==='dated' && o.date>this.planDate;},
  flash(msg,kind='ok'){this.toast={show:true,msg,kind};clearTimeout(this._t);this._t=setTimeout(()=>this.toast.show=false,2600);},
  modalOpen(html,wide=false){this.modal={open:true,html,wide};this.$nextTick(()=>this.wireRefClicks());},
  closeModal(){this.modal.open=false;},

  /* ---------- queue ---------- */
  filterChips(){return ['All','Regular','Dated','Unpaid',...new Set(ORDERS.map(o=>o.area))];},
  openOrders(){const a=this.assignedIds();return ORDERS.filter(o=>!a.has(o.id));},
  passFilter(o){const f=this.filter;if(f==='All')return true;if(f==='Regular')return o.kind==='regular';if(f==='Dated')return o.kind==='dated';if(f==='Unpaid')return o.kind==='draft';return o.area===f;},
  sortedQueue(){
    let l=this.openOrders().filter(o=>this.passFilter(o));
    const s=this.sort;
    if(s==='time')l.sort((a,b)=>a.received<b.received?-1:1);
    if(s==='area')l.sort((a,b)=>a.area<b.area?-1:(a.area>b.area?1:(a.received<b.received?-1:1)));
    if(s==='proximity')l.sort((a,b)=>a.zip<b.zip?-1:(a.zip>b.zip?1:0));
    // back orders always sink to the bottom of the list
    l.sort((a,b)=>(a.kind==='backorder'?1:0)-(b.kind==='backorder'?1:0));
    return l;
  },
  kindBadge(o){
    if(o.kind==='regular')return `<span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-gray-100 text-gray-600 uppercase tracking-wide">Regular</span>`;
    if(o.kind==='dated')return `<span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-blue-50 text-[var(--blue)] uppercase tracking-wide">Dated · ${o.date.slice(5)}</span>`;
    if(o.kind==='backorder')return `<span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-purple-50 text-[#8b5cf6] uppercase tracking-wide">🔒 Back order</span>`;
    return `<span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-amber-50 text-[var(--amber)] uppercase tracking-wide">🔒 Unpaid</span>`;
  },
  isLocked(o){return o.kind==='draft'||o.kind==='backorder';},
  toggleSelect(id){const i=this.selectedQ.indexOf(id);if(i>=0)this.selectedQ.splice(i,1);else this.selectedQ.push(id);},
  dragStart(e,o){if(this.isLocked(o)){e.preventDefault();return;}this.dragId=o.id;this.dragFuture=this.isFuture(o);e.dataTransfer.setData('text/plain',o.id);},
  assignSelectedTo(rid){
    const r=this.routes.find(x=>x.id===rid);if(!r)return;
    this.invalidateManual(r);
    const ids=[...this.selectedQ];let added=0,skipped=0,future=[];
    ids.forEach(id=>{
      const o=this.ord(id);
      if(this.isLocked(o)){skipped++;return;}
      if(this.isFuture(o)){future.push(id);return;}
      if(!r.stops.includes(id)){r.stops.push(id);added++;}
    });
    r.confirmed=false;this.selectedRoute=rid;this.selectedQ=[];this.assignMenu=false;
    let msg=added+' assigned to '+r.name;
    if(skipped)msg+=' · '+skipped+' skipped (locked)';
    if(future.length){
      this.confirm('Deliver future-dated early?',future.length+' selected order(s) are dated later than the planning day. Add them to <b>'+r.name+'</b> anyway?','Add them',()=>{future.forEach(id=>{if(!r.stops.includes(id))r.stops.push(id);});this._bump++;this.flash('Added '+future.length+' future-dated order(s).');});
    }
    this.flash(msg);
  },
  // in-route pack-together
  togglePackMode(rid){this.packMode=this.packMode===rid?null:rid;this.$nextTick(()=>this.wireStopSortables());},
  routeSel(rid){return this.routeSelections[rid]||[];},
  toggleRouteSel(rid,id){const cur=this.routeSelections[rid]?[...this.routeSelections[rid]]:[];const i=cur.indexOf(id);if(i>=0)cur.splice(i,1);else cur.push(id);this.routeSelections={...this.routeSelections,[rid]:cur};},
  clearRouteSel(rid){this.routeSelections={...this.routeSelections,[rid]:[]};},
  inPackGroup(r,id){return (r.packGroups||[]).some(g=>g.includes(id));},
  packSelected(r){
    const ids=this.routeSel(r.id);
    if(ids.length<2){this.flash('Select at least 2 stops to pack together.','warn');return;}
    if(r.packing!=='per-order'){this.flash('Pack-together applies to per-order routes (mixed already combines everything).','warn');return;}
    this.invalidateManual(r);
    r.packGroups=r.packGroups||[];
    // remove these ids from any existing group, then add the new group
    r.packGroups=r.packGroups.map(g=>g.filter(x=>!ids.includes(x))).filter(g=>g.length>=2);
    r.packGroups.push([...ids]);
    this.clearRouteSel(r.id);this.packMode=null;this._bump++;
    this.$nextTick(()=>this.wireStopSortables());
    this.flash(ids.length+' stops packed together — they now share pallets.');
  },
  unpackGroup(r,gi){this.invalidateManual(r);r.packGroups.splice(gi,1);this._bump++;this.flash('Unpacked — orders pack individually again.');},

  /* ---------- routes ---------- */
  dropOnRoute(r,id,future){
    if(!id)return;const o=this.ord(id);
    if(this.isLocked(o)){this.flash('Locked order — cannot route.','err');return;}
    const add=()=>{this.invalidateManual(r);if(!r.stops.includes(id)){r.stops.push(id);this.selectedRoute=r.id;r.confirmed=false;}};
    if(future){
      this.confirm('Deliver early?',`Order <b>${o.id}</b> is dated for <b>${o.date}</b>, later than the planning day.<br><br>Deliver now?`,'Deliver now',add);
    } else add();
    this.dragId=null;
  },

  /* ---------- pallet algorithm ---------- */
  computePallets(lines){
    const pm=this.PM();
    // merge duplicate codes
    const merged={};lines.forEach(l=>{merged[l.code]=(merged[l.code]||0)+l.cases;});
    const typeKey=p=>p.category+'|'+p.size+'|'+p.flavor;
    let items=Object.entries(merged).map(([code,cases])=>({code,cases,p:pm[code]}));
    // order items by like-type, then stability, for deterministic grouping
    items.sort((a,b)=>{const ka=typeKey(a.p),kb=typeKey(b.p);if(ka!==kb)return ka<kb?-1:1;return a.p.stabilityRank-b.p.stabilityRank;});

    const pallets=[];
    const mkPallet=()=>{const x={contents:[],used:0};pallets.push(x);return x;};
    const addTo=(pal,it,cases)=>{const frac=cases/it.p.casesPerPallet;const ex=pal.contents.find(c=>c.code===it.code);if(ex){ex.cases+=cases;ex.frac+=frac;}else pal.contents.push({code:it.code,cases,frac,p:it.p});pal.used+=frac;};

    // ---- PHASE 1: same-product-whole ----
    // each product fills as many FULL pallets as it can on its own; only the remainder carries forward.
    const leftovers=[]; // {code,cases,p,frac}
    for(const it of items){
      const cpp=it.p.casesPerPallet;
      let remaining=it.cases;
      const fullPallets=Math.floor(remaining/cpp);
      for(let k=0;k<fullPallets;k++){const pal=mkPallet();addTo(pal,it,cpp);}
      remaining-=fullPallets*cpp;
      if(remaining>0)leftovers.push({code:it.code,cases:remaining,p:it.p,frac:remaining/cpp});
    }

    // ---- PHASE 2: group remaining partials by like-type onto shared pallets ----
    // leftovers already sorted by type (items order preserved). Pack first-fit-decreasing within
    // type adjacency so like products share a pallet and gaps fill with the nearest type.
    // Sort leftovers: by type, then largest-first (so big partials seed pallets, small ones fill gaps).
    leftovers.sort((a,b)=>{const ka=typeKey(a.p),kb=typeKey(b.p);if(ka!==kb)return ka<kb?-1:1;return b.frac-a.frac;});
    const sharedStart=pallets.length;
    for(const lo of leftovers){
      // prefer a shared pallet that ALREADY holds the same type (golden rule: like with like),
      // else the same category, else any shared pallet with room, else open a new one.
      let best=null,bestScore=-1;
      for(let i=sharedStart;i<pallets.length;i++){
        const pal=pallets[i];if(1-pal.used < lo.frac-1e-9)continue;
        let score=0;
        if(pal.contents.some(c=>typeKey(c.p)===typeKey(lo.p)))score=3;
        else if(pal.contents.some(c=>c.p.category===lo.p.category))score=2;
        else score=1;
        // tie-break: tightest fit (leaves least waste) to keep pallets dense
        const fitTight=1-(pal.used+lo.frac);
        const composite=score*100 - fitTight; // higher score wins, then tighter fit
        if(composite>bestScore){bestScore=composite;best=pal;}
      }
      if(!best)best=mkPallet();
      addTo(best,lo,lo.cases);
    }

    // ---- finalize: drop empties, order each pallet bottom(least stable)→top(most stable) ----
    const fp=pallets.filter(p=>p.contents.length>0);
    fp.forEach(p=>p.contents.sort((a,b)=>a.p.stabilityRank-b.p.stabilityRank));
    return fp;
  },
  palletPlan(r,modeOverride){
    const mode=modeOverride||r.packing;
    const stops=r.stops.map(id=>this.ord(id));
    if(stops.length===0)return [];
    // Manual rearrangement override: if the user has hand-edited pallets for this route's
    // active packing mode, return the stored arrangement instead of recomputing.
    if(r.manualPlan && r.manualPlanMode===mode && !modeOverride){
      return r.manualPlan;
    }
    if(mode==='per-order'){
      const groups=[];const handled=new Set();
      (r.packGroups||[]).forEach(g=>{const m=g.filter(id=>r.stops.includes(id));if(m.length<2)return;m.forEach(id=>handled.add(id));const lines=m.flatMap(id=>this.ord(id).lines);groups.push({label:'Packed together: '+m.join(' + '),orderIds:m,pallets:this.computePallets(lines)});});
      stops.forEach(o=>{if(handled.has(o.id))return;groups.push({label:o.id+' · '+o.customer,orderIds:[o.id],pallets:this.computePallets(o.lines)});});
      return groups;
    } else {
      const sep=r.separated||[];const groups=[];const mixedLines=[];
      stops.forEach(o=>{
        if(sep.includes(o.id)){
          const back=(r.backToMixed&&r.backToMixed[o.id])||[];
          const own=o.lines.filter(l=>!back.includes(l.code));const bk=o.lines.filter(l=>back.includes(l.code));
          if(own.length)groups.push({label:'Separate: '+o.id+' · '+o.customer,orderIds:[o.id],separated:true,pallets:this.computePallets(own)});
          mixedLines.push(...bk);
        } else mixedLines.push(...o.lines);
      });
      if(mixedLines.length)groups.unshift({label:'Mixed load (all stops merged)',orderIds:stops.filter(o=>!sep.includes(o.id)).map(o=>o.id),mixed:true,pallets:this.computePallets(mixedLines)});
      return groups;
    }
  },
  palletCount(r){return this.palletPlan(r).reduce((s,g)=>s+g.pallets.length,0);},
  palletCountMode(r,mode){return this.palletPlan(r,mode).reduce((s,g)=>s+g.pallets.length,0);},
  overCap(r){return this.palletCount(r)>this.truckCap(r.truckType);},
  capPct(r){const c=this.truckCap(r.truckType);return c?Math.min(100,this.palletCount(r)/c*100):0;},

  palletBoxHtml(pal,idx,gIdx,pIdx,palletId){

  // manually move a product (whole line) from one pallet to another within the same group
  moveProduct(gFrom,pFrom,gTo,pTo,code){
    const r=this.routes.find(x=>x.id===this.selectedRoute);
    if(!r||!r.manualPlan){return;}
    if(gFrom===gTo&&pFrom===pTo)return; // dropped on itself
    if(gFrom!==gTo){this.flash('Products can only move between pallets within the same group.','warn');return;}
    const grp=r.manualPlan[gFrom];if(!grp)return;
    const src=grp.pallets[pFrom],dst=grp.pallets[pTo];if(!src||!dst)return;
    const ci=src.contents.findIndex(c=>c.code===code);if(ci<0)return;
    const moved=src.contents[ci];
    // remove from source
    src.contents.splice(ci,1);src.used-=moved.frac;
    // merge into destination if same code already there, else push
    const ex=dst.contents.find(c=>c.code===code);
    if(ex){ex.cases+=moved.cases;ex.frac+=moved.frac;}else dst.contents.push(moved);
    dst.used+=moved.frac;
    // recompute used precisely & drop empty source pallet
    src.used=src.contents.reduce((s,c)=>s+c.frac,0);
    dst.used=dst.contents.reduce((s,c)=>s+c.frac,0);
    grp.pallets=grp.pallets.filter(p=>p.contents.length>0);
    // keep stability order within destination
    dst.contents.sort((a,b)=>a.p.stabilityRank-b.p.stabilityRank);
    this._bump++;
    this.flash('Moved '+this.PM()[code].name+(dst.used>1?' — ⚠ pallet now over 100%':''), dst.used>1?'warn':'ok');
  },

  /* ---------- picking (pallet-centric) ---------- */
  orderToItems(o){const pm=this.PM();return o.lines.map(l=>({code:l.code,name:pm[l.code].name,cat:pm[l.code].category,cases:l.cases,stab:pm[l.code].stabilityRank,pick:this.catalogPickOrder.indexOf(l.code)}));},
  // Flatten every route's pallet plan into a stable, loading-ordered list of pallets.
  // Each pallet: {id, routeId, routeName, color, groupLabel, orderIds, palLabel, items[], a(ssignment)}
  allPallets(){
    const out=[];
    this.routes.forEach(r=>{
      const plan=this.palletPlan(r);
      // loading order = reverse stop order for Bay+per-order (first-in-last-out), else plan order
      plan.forEach((g,gi)=>{
        g.pallets.forEach((pal,pi)=>{
          const id=r.id+':'+gi+':'+pi;
          const items=pal.contents.map(c=>({code:c.code,name:c.p.name,cat:c.p.category,cases:c.cases,stab:c.p.stabilityRank,pick:this.catalogPickOrder.indexOf(c.code)}))
            .sort((a,b)=>a.stab-b.stab||a.pick-b.pick); // loading sequence
          out.push({id,routeId:r.id,routeName:r.name,color:r.color,groupLabel:g.label,orderIds:g.orderIds||[],
            palLabel:'Pallet '+(pi+1)+'/'+g.pallets.length,items,
            a:this.palletAssign[id]||null});
        });
      });
    });
    return out;
  },
  palletsForDevice(dev){return this.allPallets().filter(p=>p.a&&p.a.device===dev);},
  routeProgress(rid){
    this._bump; this.palletAssign;
    const pals=this.allPallets().filter(p=>p.routeId===rid);
    const total=pals.length;let assigned=0,picked=0,confirmed=0;
    pals.forEach(p=>{const s=this.assignStatus(p.id);if(s==='confirmed')confirmed++;else if(s==='picked')picked++;else if(s==='assigned'||s==='picking')assigned++;});
    return {total,assigned,picked,confirmed};
  },
  // A "pick list" = the set of pallets assigned to ONE device within ONE route (the batch the picker works).
  pickLists(){
    const all=this.allPallets().filter(p=>p.a);
    const map={};
    all.forEach(p=>{const key=p.routeId+'|'+p.a.device;(map[key]=map[key]||{key,routeId:p.routeId,routeName:p.routeName,color:p.color,device:p.a.device,pallets:[]}).pallets.push(p);});
    return Object.values(map);
  },
  pickListsForRoute(rid){return this.pickLists().filter(l=>l.routeId===rid);},
  // overall status of a pick list = least-advanced pallet status
  listStatus(list){
    const order=['assigned','picking','picked','confirmed'];
    let min=3;list.pallets.forEach(p=>{const s=this.assignStatus(p.id);const i=order.indexOf(s);if(i>=0&&i<min)min=i;});
    return order[min];
  },
  listItems(list){ // all items across the list's pallets, merged by code, loading order
    const merged={};list.pallets.forEach(p=>p.items.forEach(it=>{merged[it.code]=merged[it.code]||{...it,cases:0};merged[it.code].cases+=it.cases;}));
    return Object.values(merged).sort((a,b)=>a.stab-b.stab||a.pick-b.pick);
  },
  listResults(list){ // merged picked results across pallets (only meaningful once picked)
    const merged={};list.pallets.forEach(p=>(p.a.results||[]).forEach(r=>{merged[r.code]=merged[r.code]||{...r,cases:0,picked:0};merged[r.code].cases+=r.cases;merged[r.code].picked+=r.picked;merged[r.code].short=merged[r.code].cases-merged[r.code].picked;}));
    return Object.values(merged).sort((a,b)=>a.stab-b.stab||a.pick-b.pick);
  },
  deviceName(num){const d=this.devices.find(d=>d.num===num);return d?d.name:('Device '+num);},
  assignStatus(id){const a=this.palletAssign[id];return a?a.status:'unassigned';},
  // manager selection
  togglePalletSel(id){const i=this.palletSel.indexOf(id);if(i>=0)this.palletSel.splice(i,1);else this.palletSel.push(id);},
  selectOrderPallets(routeId,gi){ // select/deselect all pallets of one group(order)
    const ids=this.allPallets().filter(p=>p.id.startsWith(routeId+':'+gi+':')).map(p=>p.id);
    const allSel=ids.every(id=>this.palletSel.includes(id));
    if(allSel)this.palletSel=this.palletSel.filter(id=>!ids.includes(id));
    else ids.forEach(id=>{if(!this.palletSel.includes(id))this.palletSel.push(id);});
  },
  clearPalletSel(){this.palletSel=[];},
  assignPalletsTo(dev){
    if(this.palletSel.length===0){this.flash('Select pallets first.','warn');return;}
    let n=0;this.palletSel.forEach(id=>{
      const cur=this.palletAssign[id];
      if(cur&&(cur.status==='picked'||cur.status==='confirmed')){return;} // don't reassign completed
      this.palletAssign[id]={device:dev,status:'assigned',results:null};n++;
    });
    this.palletAssign={...this.palletAssign};
    this.clearPalletSel();this.assignPalletMenu=false;this._bump++;
    const d=this.devices.find(x=>x.num===dev);
    this.flash(n+' pallet(s) assigned to '+(d?d.name:('Device '+dev))+'.');
  },
  unassignPallet(id){if(this.palletAssign[id]){delete this.palletAssign[id];this.palletAssign={...this.palletAssign};this._bump++;}},

  buildPickerSession(dev){
    const pals=this.palletsForDevice(dev).filter(p=>p.a.status==='assigned'||p.a.status==='picking');
    if(pals.length===0)return;
    pals.forEach(p=>{this.palletAssign[p.id]={...this.palletAssign[p.id],status:'picking'};});
    this.palletAssign={...this.palletAssign};
    let items=[];
    pals.forEach(p=>p.items.forEach(it=>items.push({...it,palletId:p.id})));
    items.sort((a,b)=>a.stab-b.stab||a.pick-b.pick);
    this.picker={dev,palletIds:pals.map(p=>p.id),idx:0,results:[],items,shorted:false,partialFor:null,partialQty:0};
  },
  startPickFor(dev){this.buildPickerSession(dev);this._bump++;},
  // picker re-picks a pallet that was already submitted (manager hasn't confirmed): reset to assigned, rebuild session
  repickPallet(palletId){
    const a=this.palletAssign[palletId];if(!a)return;

    this.picker=null;this._bump++;
    this.flash('Re-picking — previous result cleared for this batch.','warn');
  },
  pickerWorkHtml(){

      actions=`<div class="mt-6 bg-amber-50 border-2 border-[var(--amber)] rounded-2xl p-4">

        </div>

          <button onclick="window._app.confirmPartial()" class="flex-1 py-3 rounded-xl bg-[var(--amber)] text-white font-bold">Confirm ${pq} cases</button>
        </div></div>`;
    } else {

  },
  openPartial(){this.picker.partialFor=this.picker.idx;this.picker.partialQty=Math.max(0,this.picker.items[this.picker.idx].cases-1);this._bump++;},
  partialStep(d){const it=this.picker.items[this.picker.idx];this.picker.partialQty=Math.min(it.cases,Math.max(0,this.picker.partialQty+d));this._bump++;},
  cancelPartial(){this.picker.partialFor=null;this._bump++;},
  confirmPartial(){const q=this.picker.partialQty;this.picker.partialFor=null;this.pickAnswer(q,'partial');},
  pickAnswer(qty,kind){
    const it=this.picker.items[this.picker.idx];
    this.picker.results.push({...it,picked:qty,short:it.cases-qty,kind});
    this.picker.idx++;
    // golden-rule re-sequence: if short, re-sort the remaining unpicked items to re-maximize fill
    if(qty<it.cases){const rest=this.picker.items.slice(this.picker.idx);rest.sort((a,b)=>a.stab-b.stab||a.pick-b.pick);this.picker.items=this.picker.items.slice(0,this.picker.idx).concat(rest);this.picker.shorted=true;}
    this._bump++;
  },
  pickerCompleteHtml(){

    palletIds.forEach(pid=>{

      this.palletAssign[pid]={...this.palletAssign[pid],status:'picked',results:palResults};
    });
    this.palletAssign={...this.palletAssign};
    const disc=results.filter(r=>r.short>0);
    const note=shorted?`<div class="mb-4 rounded-xl bg-amber-50 border border-amber-200 p-3 text-base">⟳ <b>Unpicked items re-sequenced.</b> Short quantities were detected, so the remaining items were re-ordered to re-maximize pallet fill.</div>`:'';
    let h=`<div class="p-6 max-w-xl mx-auto"><div class="flex items-center justify-between mb-4"><h3 class="font-display font-black text-2xl">Pick complete</h3>
      <button onclick="window._app.picker=null;window._app._bump++" class="text-sm text-gray-400">← back to lists</button></div>${note}
      <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden mb-4"><table class="w-full text-base"><thead class="bg-gray-50 text-xs uppercase text-gray-400"><tr><th class="text-left px-3 py-2">Product</th><th class="px-3 py-2">Req</th><th class="px-3 py-2">Picked</th><th class="px-3 py-2">Status</th></tr></thead><tbody>`;
    results.forEach(r=>{h+=`<tr class="border-t border-gray-100"><td class="px-3 py-2 font-medium">${r.name}</td><td class="px-3 py-2 text-center font-mono">${r.cases}</td><td class="px-3 py-2 text-center font-mono ${r.short>0?'text-[var(--red)] font-bold':''}">${r.picked}</td><td class="px-3 py-2 text-center">${r.short>0?`<span class="text-xs font-bold text-[var(--red)]">SHORT ${r.short}</span>`:`<span class="text-xs font-bold text-[var(--green)]">OK</span>`}</td></tr>`;});
    h+=`</tbody></table></div>
      <div class="rounded-2xl ${disc.length?'border-2 border-[var(--amber)] bg-amber-50':'border border-[var(--green)] bg-green-50'} p-4 text-center">
      ${disc.length?`<div class="font-display font-bold text-[var(--amber)] text-lg">Submitted with ${disc.length} discrepanc${disc.length>1?'ies':'y'}</div><div class="text-sm text-gray-600 mt-1">Manager reviews & confirms (here or on the Handheld).</div>`:`<div class="font-display font-bold text-[var(--green)] text-lg">✓ Submitted — all items picked in full</div>`}</div></div>`;
    return h;

  /* ---------- manager handheld ---------- */
  handheldHtml(){

  // confirm / discrepancy resolution for a picked pallet
  openConfirm(palletId){

    let discRows = disc.map((d,i)=>{

        <button onclick="window._app.resolveDisc('${palletId}',${gi},'backorder',this)" class="flex-1 text-xs font-semibold px-2 py-2 rounded bg-[var(--blue)] text-white">Save as back order</button>
      </div></div>`;}).join('');
    this.modalOpen(`<h3 class="font-display font-bold text-lg mb-1">Confirm picked pallet</h3>
      <div class="text-xs text-gray-500 mb-2">${pal?pal.routeName+' · '+pal.groupLabel+' · '+pal.palLabel:palletId}</div>
      <div class="text-[11px] text-gray-400 mb-2">Adjust picked quantities with ± if the count is off, then handle any remaining shortfall below.</div>
      <div class="border border-gray-100 rounded-lg overflow-hidden mb-3"><table class="w-full text-sm"><thead class="bg-gray-50 text-[10px] uppercase text-gray-400"><tr><th class="text-left px-2 py-1">Product</th><th class="px-2 py-1">Req</th><th class="px-2 py-1">Picked (editable)</th></tr></thead><tbody>${rows}</tbody></table></div>
      <div id="discZone">${disc.length?`<div class="text-xs font-bold text-[var(--amber)] mb-1.5">${disc.length} shortfall(s) — choose what to do with each:</div>${discRows}`:`<div class="text-sm text-[var(--green)] font-semibold mb-2">✓ No discrepancies — picked in full.</div>`}</div>

      <button onclick="window._app.confirmPallet('${palletId}')" class="flex-1 py-2 rounded-lg bg-ink text-white font-semibold text-sm">Confirm pallet ✓</button></div>`,true);
  },
  editPicked(palletId,ri,delta){
    const a=this.palletAssign[palletId];if(!a||!a.results[ri])return;
    const r=a.results[ri];
    const nv=Math.max(0,Math.min(r.cases,r.picked+delta)); // clamp 0..required
    r.picked=nv;r.short=r.cases-nv;
    if(r.short<=0)r._resolved=false; // no longer a shortfall; clear any prior resolution flag
    this.palletAssign={...this.palletAssign};
    this.openConfirm(palletId); // re-render modal from state (steppers persist because state-backed)
  },
  resolveDisc(palletId,gi,mode,btn){
    const a=this.palletAssign[palletId];const disc=a.results[gi];if(!disc||disc.short<=0||disc._resolved)return;
    if(mode==='discard'){this.flash(`Discarded shortfall: ${disc.short}× ${this.PM()[disc.code].name}.`,'warn');}
    else{
      const no='BO-'+String(this.backSeq++).padStart(3,'0');
      ORDERS.push({id:no,customer:'(back order)',area:'—',zip:'22701',kind:'backorder',received:'pending stock',lines:[{code:disc.code,cases:disc.short}],coord:_coord({zip:'22701'})});
      this.flash(`Back order ${no} created for ${disc.short}× ${this.PM()[disc.code].name} (locked until in stock).`);
    }
    disc._resolved=true;disc._resolution=mode;
    this.palletAssign={...this.palletAssign};
    this.openConfirm(palletId);
  },
  confirmPallet(palletId){
    const a=this.palletAssign[palletId];if(!a)return;
    const disc=(a.results||[]).filter(r=>r.short>0&&!r._resolved);
    if(disc.length){this.flash('Resolve each discrepancy (discard or back order) first.','warn');return;}

      <div class="flex gap-2 mt-3"><button onclick="window._app.closeModal()" class="flex-1 py-2 rounded-lg border border-gray-200 font-semibold text-sm">Close</button>

  /* ---------- demo map (offline SVG, shown while arranging) ---------- */
  demoMapHtml(){
    this._bump; this.selectedRoute; this.routes; this.selectedOrder;
    const W=560,H=190,pad=22;
    // project lat/lng of all visible points into the viewBox
    const pts=[];
    ORDERS.forEach(o=>{ if(o.coord) pts.push(o.coord); });
    if(pts.length===0)return `<div class="text-[11px] text-gray-400 text-center py-6">No orders to map.</div>`;
    let minLa=Math.min(...pts.map(p=>p[0])),maxLa=Math.max(...pts.map(p=>p[0]));
    let minLo=Math.min(...pts.map(p=>p[1])),maxLo=Math.max(...pts.map(p=>p[1]));
    if(maxLa-minLa<0.01){minLa-=0.3;maxLa+=0.3;} if(maxLo-minLo<0.01){minLo-=0.3;maxLo+=0.3;}
    const px=lo=>pad+(lo-minLo)/(maxLo-minLo)*(W-2*pad);
    const py=la=>pad+(maxLa-la)/(maxLa-minLa)*(H-2*pad); // invert: north up
    const xy=c=>[px(c[1]),py(c[0])];

    const assigned=new Set(this.routes.flatMap(r=>r.stops));
    const sel=this.routes.find(r=>r.id===this.selectedRoute);

    // decorative demo basemap: faux roads + river + warehouse
    let g=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;max-height:210px" font-family="Archivo,sans-serif">
      <defs><pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#cdd8e2" stroke-width="1"/></pattern></defs>
      <rect width="${W}" height="${H}" fill="#e3ebf2"/>
      <rect width="${W}" height="${H}" fill="url(#grid)"/>
      <path d="M0 60 Q140 40 280 95 T560 120" fill="none" stroke="#bcdcef" stroke-width="9" opacity="0.8"/>
      <path d="M70 0 L120 ${H}" stroke="#fff" stroke-width="5" opacity="0.7"/>
      <path d="M0 130 L${W} 110" stroke="#fff" stroke-width="5" opacity="0.7"/>
      <path d="M360 0 L330 ${H}" stroke="#fff" stroke-width="4" opacity="0.6"/>
      <text x="${W-8}" y="${H-8}" text-anchor="end" font-size="9" fill="#9aa7b4">demo map · illustrative</text>`;

    // warehouse marker
    const wxy=xy([this.warehouse.lat,this.warehouse.lng]);
    g+=`<g transform="translate(${wxy[0]},${wxy[1]})"><rect x="-8" y="-8" width="16" height="16" rx="3" fill="#0f1419"/><text x="0" y="4" text-anchor="middle" font-size="10" fill="#fff">▣</text><text x="0" y="-12" text-anchor="middle" font-size="8" font-weight="700" fill="#0f1419">WH</text></g>`;

    // route polylines (selected route solid+colored, others light grey)
    this.routes.forEach(r=>{
      if(r.stops.length<2)return;
      const isSel=r.id===this.selectedRoute;
      const d=r.stops.map((id,i)=>{const o=this.ord(id);const c=xy(o.coord);return (i?'L':'M')+c[0]+' '+c[1];}).join(' ');
      g+=`<path d="${d}" fill="none" stroke="${isSel?r.color:'#c0cad4'}" stroke-width="${isSel?3:2}" stroke-linejoin="round" stroke-linecap="round" ${isSel?'':'stroke-dasharray="4 5"'} opacity="${isSel?0.95:0.6}"/>`;
    });

    // dots
    const drawDot=(c,fill,label,sub,emph)=>{
      const r=emph?12:10;
      return `<g transform="translate(${c[0]},${c[1]})">
        <circle r="${r+2}" fill="#000" opacity="0.12" cx="0" cy="1"/>
        <circle r="${r}" fill="${fill}" stroke="#fff" stroke-width="2"/>
        <text x="0" y="${r/3}" text-anchor="middle" font-size="${emph?11:10}" font-weight="800" fill="#fff">${label}</text>
        ${sub?`<text x="0" y="${-r-3}" text-anchor="middle" font-size="8" font-weight="700" fill="#46535f">${sub}</text>`:''}
      </g>`;
    };

    // selected route stops: colored + numbered in sequence
    if(sel){
      sel.stops.forEach((id,i)=>{ const o=this.ord(id); g+=drawDot(xy(o.coord),sel.color,String(i+1),o.zip,this.selectedOrder===id); });
    }
    // other routes' stops: grey, numbered by their own sequence
    this.routes.forEach(r=>{ if(r.id===this.selectedRoute)return; r.stops.forEach((id,i)=>{ const o=this.ord(id); g+=drawDot(xy(o.coord),'#94a3b8',String(i+1),'',false); }); });
    // unassigned orders: small hollow grey dots, no number
    ORDERS.forEach(o=>{ if(assigned.has(o.id))return; const c=xy(o.coord);
      g+=`<g transform="translate(${c[0]},${c[1]})"><circle r="5" fill="#cbd5e1" stroke="#fff" stroke-width="1.5"/></g>`; });

    g+=`</svg>`;

    // legend / caption
    const legend = sel
      ? `<span class="inline-flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full" style="background:${sel.color}"></span><b>${sel.name}</b> — optimized order, drag stops to re-sequence</span>`
      : `<span>Select a route below to see its optimized path</span>`;
    return `<div class="px-2 pt-1.5">${g}</div>
      <div class="px-3 pb-2 flex items-center gap-3 text-[10px] text-gray-500 flex-wrap">
        ${legend}
        <span class="inline-flex items-center gap-1 ml-auto"><span class="w-2.5 h-2.5 rounded-full bg-[#94a3b8]"></span>other routes</span>
        <span class="inline-flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-[#cbd5e1]"></span>unassigned</span>
        <span class="inline-flex items-center gap-1"><span class="text-ink font-bold">▣</span>warehouse</span>
      </div>`;
  },

  /* ---------- sortables ---------- */
  wireStopSortables(){
    document.querySelectorAll('[x-ref="dz"]').forEach(dz=>{
      const rid=dz.dataset.routeid;
      if(!dz._sortable){
        dz._sortable=new Sortable(dz,{animation:150,draggable:'.stop-row',handle:'.stop-row',onEnd:()=>{const ids=[...dz.querySelectorAll('.stop-row')].map(x=>x.dataset.stopid);const r=this.routes.find(x=>x.id===rid);if(r){this.invalidateManual(r);r.stops=ids;this._bump++;}}});
      }
      // disable drag-reorder while picking stops to pack
      dz._sortable.option('disabled', this.packMode===rid);
    });
  },
  wireCfgSortables(){
    const stab=document.getElementById('stabList');
    if(stab&&!stab._sortable){stab._sortable=new Sortable(stab,{animation:150,draggable:'.stab-row',onEnd:()=>{const codes=[...stab.querySelectorAll('.stab-row')].map(x=>x.dataset.code);codes.forEach((c,i)=>{PRODUCTS.find(p=>p.code===c).stabilityRank=i+1;});this._bump++;this.flash('Stability ranking updated.');}});}
    const pick=document.getElementById('pickList');
    if(pick&&!pick._sortable){pick._sortable=new Sortable(pick,{animation:150,draggable:'.pick-row',onEnd:()=>{this.catalogPickOrder=[...pick.querySelectorAll('.pick-row')].map(x=>x.dataset.code);this._bump++;this.flash('Catalog pick order updated.');}});}
  },

  /* ---------- reference-click + rearrange DnD ---------- */
  wireRefClicks(){
    document.querySelectorAll('.ref-target').forEach(node=>{
      if(node._refWired)return;node._refWired=true;
      node.addEventListener('mouseenter',e=>{e.stopPropagation();document.querySelectorAll('.ref-hover').forEach(x=>x.classList.remove('ref-hover'));node.classList.add('ref-hover');});
      node.addEventListener('mouseleave',()=>node.classList.remove('ref-hover'));
      node.addEventListener('click',e=>{if(e.altKey){e.stopPropagation();e.preventDefault();document.querySelectorAll('.ref-pinned').forEach(x=>x.classList.remove('ref-pinned'));node.classList.add('ref-pinned');this.flash('Referenced '+(node.dataset.refid||'element')+' (would attach to chat)');}});
    });
    // rearrange drag for product chips
    if(this.rearrange){
      document.querySelectorAll('.prod-chip[draggable=true]').forEach(chip=>{
        if(chip._dwired)return;chip._dwired=true;
        chip.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',JSON.stringify({code:chip.dataset.code,g:+chip.dataset.g,p:+chip.dataset.p}));chip.style.opacity='.4';});
        chip.addEventListener('dragend',e=>{chip.style.opacity='';});
      });
      document.querySelectorAll('[data-palletdrop]').forEach(z=>{
        if(z._dwired)return;z._dwired=true;
        z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag-over');});
        z.addEventListener('dragleave',()=>z.classList.remove('drag-over'));
        z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('drag-over');try{const d=JSON.parse(e.dataTransfer.getData('text/plain'));this.moveProduct(d.g,d.p,+z.dataset.g,+z.dataset.p,d.code);}catch(_){}});
      });
    }
  },

  /* ---------- modal confirm ---------- */
  confirm(title,body,yesLabel,onYes){
    this._confirmYes=onYes;
    this.modalOpen(`<h3 class="font-display font-bold text-lg mb-2">${title}</h3><p class="text-sm text-gray-600 mb-4">${body}</p>
      <div class="flex gap-2"><button onclick="window._app.closeModal()" class="flex-1 py-2 rounded-lg border border-gray-200 font-semibold text-sm">Cancel</button>
      <button onclick="window._app._confirmYes&&window._app._confirmYes();window._app.closeModal()" class="flex-1 py-2 rounded-lg bg-[var(--blue)] text-white font-semibold text-sm">${yesLabel}</button></div>`);
  },
  _confirmYes:null,
 };
}
// expose for inline onclick handlers in x-html content
document.addEventListener('alpine:init',()=>{});
window.addEventListener('DOMContentLoaded',()=>{
  // bind global reference after Alpine mounts
  const tryBind=()=>{const root=document.querySelector('[x-data]');if(root&&root._x_dataStack){window._app=root._x_dataStack[0];}else setTimeout(tryBind,50);};
  tryBind();
});
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>
